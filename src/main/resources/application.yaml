spring:
  application:
    name: library

  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      jdbc:
        time_zone: Asia/Kolkata
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  jackson:
    time-zone: Asia/Kolkata

server:
  port: 8080

jwt:
  secret: myVeryLongSecretKeyForLibraryManagementSystem2026
  expiration: 86400000

logging:
  level:
    org.springframework.mail: DEBUG
    javax.mail: DEBUG