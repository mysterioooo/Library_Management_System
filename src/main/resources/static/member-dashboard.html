<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Member Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f8fafc;
            color:#1e293b;
        }

        nav{
            background:white;
            padding:18px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #e2e8f0;
            box-shadow:0 2px 10px rgba(0,0,0,.05);
        }

        nav h2{
            font-size:30px;
            font-weight:700;
        }

        nav button{
            background:#2563eb;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
        }

        nav button:hover{
            background:#1d4ed8;
        }

        .menu{
            max-width:1600px;
            margin:25px auto;
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            padding:0 25px;
        }

        .menu button{
            background:white;
            color:#334155;
            border:1px solid #e2e8f0;
            padding:12px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            box-shadow:0 2px 8px rgba(0,0,0,.04);
        }

        .menu button:hover{
            background:#2563eb;
            color:white;
        }

        .content{
            max-width:1600px;
            margin:auto;
            padding:0 25px 30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            margin-bottom:25px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:16px;
            border:1px solid #e2e8f0;
            box-shadow:0 4px 12px rgba(15,23,42,.05);
            position:relative;
        }

        .card::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:4px;
            background:#2563eb;
        }

        .card h3{
            color:#64748b;
            margin-bottom:12px;
        }

        .card h1{
            color:#2563eb;
            font-size:42px;
            margin:0;
        }

        .panel{
            background:white;
            padding:25px;
            border-radius:16px;
            border:1px solid #e2e8f0;
            box-shadow:0 4px 12px rgba(15,23,42,.05);
        }

        .panel h3{
            margin-bottom:18px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#f8fafc;
            color:#475569;
            padding:14px;
            text-align:left;
            border-bottom:2px solid #e2e8f0;
        }

        td{
            padding:14px;
            border-bottom:1px solid #e2e8f0;
        }

        tr:hover{
            background:#f8fafc;
        }

        .available{
            color:#16a34a;
            font-weight:600;
        }

        .unavailable{
            color:#dc2626;
            font-weight:600;
        }

        @media(max-width:900px){

            .cards{
                grid-template-columns:1fr;
            }

            .menu{
                flex-direction:column;
            }

            .menu button{
                width:100%;
            }
        }

    </style>
</head>
<body>

<nav>

    <h2>Member Dashboard</h2>

    <button onclick="logout()">
        Logout
    </button>

</nav>

<div class="menu">

    <button onclick="location.href='books.html'">
        Browse Books
    </button>

    <button onclick="location.href='myhistory.html'">
        My History
    </button>

    <button onclick="location.href='member-book-reserve.html'">
        Reserve Book
    </button>

    <button onclick="location.href='myfine.html'">
        My Fines
    </button>

</div>

<div class="content">

    <div class="cards">

        <div class="card">
            <h3>Books Issued</h3>
            <h1 id="issuedCount">0</h1>
        </div>

        <div class="card">
            <h3>Reservations</h3>
            <h1 id="reservationCount">0</h1>
        </div>

        <div class="card">
            <h3>Pending Fines</h3>
            <h1 id="fineCount">0</h1>
        </div>

    </div>

    <div class="panel">

        <h3>Available Books</h3>

        <table>

            <thead>
            <tr>
                <th>Cover</th>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Available</th>
            </tr>
            </thead>

            <tbody id="bookBody">

            <tr>
                <td colspan="5">
                    Loading...
                </td>
            </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

    const API_BASE =
        "http://localhost:8080/api";

    const token =
        localStorage.getItem("token");

    const role =
        localStorage.getItem("role");

    const userId =
        localStorage.getItem("userId");

    if(!token || role !== "ROLE_MEMBER"){

        alert("Access Denied");

        location.href =
            "index.html";
    }

    async function loadDashboard(){

        await Promise.all([
            loadBooks(),
            loadIssuedCount(),
            loadReservationCount(),
            loadFineCount()
        ]);
    }

   async function loadBooks(){

    try{

        const response =
            await fetch(
                `${API_BASE}/books?page=0&size=20`,
                {
                    headers:{
                        "Authorization":
                            "Bearer " + token
                    }
                });

        const data =
            await response.json();

        let html = "";

        data.content.forEach(book => {

            const imageHtml =
                book.imageName
                ?
                `
                <img
                    src="http://localhost:8080/uploads/books/${book.imageName}"
                    width="60"
                    height="80"
                    style="
                        object-fit:cover;
                        border-radius:8px;
                        border:1px solid #ddd;
                    ">
                `
                :
                `
                <div
                    style="
                        width:60px;
                        height:80px;
                        background:#f1f5f9;
                        border:1px solid #ddd;
                        border-radius:8px;
                        display:flex;
                        align-items:center;
                        justify-content:center;
                        font-size:11px;
                        color:#64748b;
                    ">
                    No Image
                </div>
                `;

            html += `
            <tr>

                <td>
                    ${imageHtml}
                </td>

                <td>
                    ${book.title}
                </td>

                <td>
                    ${book.author}
                </td>

                <td>
                    ${book.categoryName ?? "-"}
                </td>

                <td class="${
                    book.availableCopies > 0
                    ? "available"
                    : "unavailable"
                }">

                    ${book.availableCopies}

                </td>

            </tr>
            `;
        });

        document.getElementById(
            "bookBody"
        ).innerHTML = html;

    }catch(error){

        console.error(error);

        document.getElementById(
            "bookBody"
        ).innerHTML =
        `
        <tr>
            <td colspan="5">
                Unable To Load Books
            </td>
        </tr>
        `;
    }
}

    async function loadIssuedCount(){

        try{

            const response =
                await fetch(
                    `${API_BASE}/issues/history/${userId}`,
                    {
                        headers:{
                            "Authorization":
                                "Bearer " + token
                        }
                    });

            const issues =
                await response.json();

            const activeIssues =
                issues.filter(
                    issue => !issue.returnDate
                );

            document.getElementById(
                "issuedCount"
            ).innerText =
                activeIssues.length;

        }catch(error){

            console.error(error);
        }
    }

    async function loadReservationCount(){

        try{

            const response =
                await fetch(
                    `${API_BASE}/reservations/user/${userId}`,
                    {
                        headers:{
                            "Authorization":
                                "Bearer " + token
                        }
                    });

            const reservations =
                await response.json();

            document.getElementById(
                "reservationCount"
            ).innerText =
                reservations.length;

        }catch(error){

            console.error(error);
        }
    }

    async function loadFineCount(){

        try{

            const response =
                await fetch(
                    `${API_BASE}/fines/user/${userId}`,
                    {
                        headers:{
                            "Authorization":
                                "Bearer " + token
                        }
                    });

            const fines =
                await response.json();

            const pendingFines =
                fines.filter(
                    fine => !fine.paid
                );

            document.getElementById(
                "fineCount"
            ).innerText =
                pendingFines.length;

        }catch(error){

            console.error(error);
        }
    }

    function logout(){

        localStorage.clear();

        location.href =
            "index.html";
    }

    loadDashboard();

</script>

</body>
</html>
