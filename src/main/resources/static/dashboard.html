<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
     background:#f8fafc;
     margin:0;
     font-family:'Segoe UI',sans-serif;
     color:#334155;
 }

 nav{
     background:#ffffff;
     color:#1e293b;
     padding:16px 28px;
     display:flex;
     justify-content:space-between;
     align-items:center;
     border-bottom:1px solid #e2e8f0;
     box-shadow:0 2px 10px rgba(15,23,42,.04);
 }

 nav button{
     background:#eff6ff;
     color:#2563eb;
     border:none;
     padding:10px 18px;
     border-radius:10px;
     font-weight:600;
 }

 nav button:hover{
     background:#dbeafe;
 }

 .top-bar{
     background:white;
     border:1px solid #e2e8f0;
     box-shadow:0 4px 12px rgba(15,23,42,.04);
 }

 .manage-btn{
     background:#2563eb;
     color:white;
     border:none;
     padding:10px 18px;
     border-radius:10px;
 }

 .manage-btn:hover{
     background:#1d4ed8;
 }

 .stat-card{
     background:white;
     border:1px solid #e2e8f0;
     box-shadow:0 4px 12px rgba(15,23,42,.04);
     border-radius:16px;
     transition:.3s;
 }

 .stat-card:hover{
     transform:translateY(-3px);
 }

 .stat-card h3{
     color:#64748b;
 }

 .stat-card h1{
     color:#2563eb;
 }

 .panel{
     background:white;
     border:1px solid #e2e8f0;
     border-radius:16px;
     box-shadow:0 4px 12px rgba(15,23,42,.04);
 }

 .panel h3{
     color:#1e293b;
 }

 input,
 select{
     padding:12px;
     border:1px solid #cbd5e1;
     border-radius:10px;
     background:white;
     transition:.3s;
 }

 input:focus,
 select:focus{
     border-color:#60a5fa;
     box-shadow:0 0 0 3px rgba(96,165,250,.15);
 }

 .quick-links button{
     background:#f1f5f9;
     color:#334155;
     border:1px solid #e2e8f0;
 }

 .quick-links button:hover{
     background:#e2e8f0;
 }

 .panel button{
     background:#2563eb;
     color:white;
 }

 .panel button:hover{
     background:#1d4ed8;
 }

 table{
     border-radius:12px;
     overflow:hidden;
 }

 table th{
     background:#f8fafc;
     color:#475569;
     font-weight:600;
 }

 table td{
     color:#334155;
 }

 table tr:hover{
     background:#f8fafc;
 }

 #prevBtn,
 #nextBtn{
     background:#eff6ff;
     color:#2563eb;
 }

 #prevBtn:hover,
 #nextBtn:hover{
     background:#dbeafe;
 }
    </style>
</head>
<body>

<nav>
    <h2>Library Dashboard</h2>
    <button type="button" onclick="logout()">Logout</button>
</nav>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:#f8fafc;
        color:#1e293b;
    }

    nav{
        background:#ffffff;
        padding:18px 30px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        border-bottom:1px solid #e2e8f0;
        box-shadow:0 2px 10px rgba(0,0,0,.05);
        position:sticky;
        top:0;
        z-index:100;
    }

    nav h2{
        font-size:30px;
        font-weight:700;
    }

    nav button{
        background:#2563eb;
        color:white;
        border:none;
        padding:10px 18px;
        border-radius:10px;
        cursor:pointer;
        font-weight:600;
    }

    nav button:hover{
        background:#1d4ed8;
    }

    .content{
        max-width:1600px;
        margin:auto;
        padding:30px;
    }

    .card-grid{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:20px;
        margin-bottom:25px;
    }

    .stat-card{
        background:white;
        border-radius:16px;
        padding:25px;
        box-shadow:0 4px 12px rgba(15,23,42,.06);
        border:1px solid #e2e8f0;
        position:relative;
        transition:.3s;
    }

    .stat-card:hover{
        transform:translateY(-4px);
    }

    .stat-card::before{
        content:"";
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:4px;
        background:#2563eb;
    }

    .stat-card h3{
        color:#64748b;
        margin-bottom:12px;
        font-size:16px;
    }

    .stat-card h1{
        color:#2563eb;
        font-size:42px;
    }

    .panel{
        background:white;
        border-radius:16px;
        padding:25px;
        margin-bottom:25px;
        border:1px solid #e2e8f0;
        box-shadow:0 4px 12px rgba(15,23,42,.06);
    }

    .panel h3{
        margin-bottom:18px;
    }

    .quick-links{
        display:flex;
        flex-wrap:wrap;
        gap:12px;
    }

    .quick-links button{
        background:#2563eb;
        color:white;
        border:none;
        padding:12px 18px;
        border-radius:10px;
        cursor:pointer;
        font-weight:600;
    }

    .quick-links button:hover{
        background:#1d4ed8;
    }

    .form-grid{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:15px;
        margin-bottom:20px;
    }

    input,
    select{
        width:100%;
        padding:12px;
        border:1px solid #cbd5e1;
        border-radius:10px;
        background:white;
        color:#334155;
    }

    input:focus,
    select:focus{
        outline:none;
        border-color:#2563eb;
        box-shadow:0 0 0 3px rgba(37,99,235,.1);
    }

    .button-row{
        display:flex;
        gap:10px;
        margin-top:15px;
    }

    .panel button{
        background:#2563eb;
        color:white;
        border:none;
        padding:12px 18px;
        border-radius:10px;
        cursor:pointer;
    }

    .panel button:hover{
        background:#1d4ed8;
    }

    .table-wrap{
        overflow-x:auto;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th{
        background:#f8fafc;
        color:#475569;
        padding:14px;
        text-align:left;
        border-bottom:2px solid #e2e8f0;
    }

    td{
        padding:14px;
        border-bottom:1px solid #e2e8f0;
    }

    tr:hover{
        background:#f8fafc;
    }

    #prevBtn,
    #nextBtn{
        background:#2563eb;
        color:white;
    }

    #prevBtn:disabled,
    #nextBtn:disabled{
        opacity:.5;
        cursor:not-allowed;
    }

    #pageInfo{
        font-weight:600;
        color:#475569;
    }

    @media(max-width:1200px){

        .card-grid{
            grid-template-columns:repeat(2,1fr);
        }

        .form-grid{
            grid-template-columns:repeat(2,1fr);
        }
    }

    @media(max-width:768px){

        .card-grid{
            grid-template-columns:1fr;
        }

        .form-grid{
            grid-template-columns:1fr;
        }

        .content{
            padding:15px;
        }
    }

</style>



<div class="content">

    <div class="card-grid">
        <div class="stat-card">
            <h3>Total Books</h3>
            <h1 id="totalBooks">0</h1>
        </div>

        <div class="stat-card">
            <h3>Total Users</h3>
            <h1 id="totalUsers">0</h1>
        </div>

        <div class="stat-card">
            <h3>Issued Books</h3>
            <h1 id="totalIssuedBooks">0</h1>
        </div>

        <div class="stat-card">
            <h3>Total Fines</h3>
            <h1 id="totalFines">0</h1>
        </div>
    </div>

    <div class="panel">
        <h3>Quick Actions</h3>
        <div class="quick-links">
            <button onclick="location.href='books.html'">Manage Books</button>
            <button onclick="location.href='issue-book.html'">Issue a Book</button>
            <button onclick="location.href='issue-history.html'">Issue History</button>
            <button onclick="location.href='reserve-book.html'">Reserve Book</button>
            <button onclick="location.href='categories.html'">Add Category</button>
            <button onclick="location.href='fines.html'">View Fines</button>
            <button class="manage-btn" onclick="location.href='users.html'">
                👥 Manage Users
            </button>
        </div>
    </div>

    <div class="panel">
        <h3>Add Book</h3>

        <div class="form-grid">
            <input id="isbn" type="text" placeholder="ISBN">

            <input id="title" type="text" placeholder="Title">

            <input id="author" type="text" placeholder="Author">

            <input id="publisher" type="text" placeholder="Publisher">

            <input id="bookImage" type="file" accept="image/*">

            <select id="categoryId">
                <option value="">Select Category</option>
            </select>

            <input id="totalCopies"
                   type="number"
                   placeholder="Quantity">
        </div>

        <button type="button"
                onclick="saveBook()">
            Save Book
        </button>
    </div>

    <div class="panel">
        <h3>Search / Sort</h3>

        <div class="form-grid">
            <input id="searchKeyword" type="text" placeholder="Search books">

            <select id="sortBy">
                <option value="id">ID</option>
                <option value="title">Title</option>
                <option value="author">Author</option>
                <option value="totalCopies">Quantity</option>
            </select>

            <select id="direction">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </div>

        <div class="button-row">
            <button type="button" onclick="searchBooks()">Search</button>
            <button type="button" onclick="loadBooks(0)">Apply Sort</button>
            <button type="button" onclick="clearSearch()">Clear</button>
        </div>
    </div>

    <div class="panel">
        <h3>Books</h3>

        <div class="table-wrap">
            <table id="bookTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>ISBN</th>
                    <th>Cover</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Publisher</th>
                    <th>Category</th>
                    <th>Total</th>
                    <th>Available</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody></tbody>
            </table>
        </div>

        <div style="margin-top:20px; display:flex; gap:10px; align-items:center;">
            <button id="prevBtn" type="button" onclick="loadBooks(currentPage - 1)">
                Previous
            </button>

            <span id="pageInfo" class="muted">Page 1</span>

            <button id="nextBtn" type="button" onclick="loadBooks(currentPage + 1)">
                Next
            </button>
        </div>
    </div>

</div>

<script>
    const API_BASE = "http://localhost:8080/api";
    const token = localStorage.getItem("token");

    let currentPage = 0;
    const pageSize = 5;
    let searchMode = false;

    const publisherInput = document.getElementById("publisher");
    const categorySelect = document.getElementById("categoryId");
    const isbnInput = document.getElementById("isbn");
    const titleInput = document.getElementById("title");
    const authorInput = document.getElementById("author");
    const totalCopiesInput = document.getElementById("totalCopies");
    const bookImageInput = document.getElementById("bookImage");
    const searchKeywordInput = document.getElementById("searchKeyword");
    const sortBySelect = document.getElementById("sortBy");
    const directionSelect = document.getElementById("direction");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    async function loadDashboard() {
        try {
            const response = await fetch(`${API_BASE}/dashboard`, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!response.ok) {
                throw new Error();
            }

            const data = await response.json();

            document.getElementById("totalBooks").innerText = data.totalBooks ?? 0;
            document.getElementById("totalUsers").innerText = data.totalUsers ?? 0;
            document.getElementById("totalIssuedBooks").innerText = data.totalIssuedBooks ?? 0;
            document.getElementById("totalFines").innerText = data.totalFines ?? 0;

        } catch (error) {
            console.error(error);
        }
    }

    async function loadBooks(page = 0) {
        try {
            searchMode = false;
            currentPage = page;

            const sortBy = sortBySelect.value;
            const direction = directionSelect.value;

            const response = await fetch(
                `${API_BASE}/books?page=${page}&size=${pageSize}&sortBy=${sortBy}&direction=${direction}`,
                {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || "Failed to load books");
            }

            const pageData = await response.json();
            renderBooks(pageData.content || []);

            if (pageData.totalPages === 0) {
                pageInfo.innerText = "No books found";
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            pageInfo.innerText = `Page ${pageData.number + 1} of ${pageData.totalPages}`;
            prevBtn.disabled = pageData.first;
            nextBtn.disabled = pageData.last;

        } catch (error) {
            console.error(error);
            alert("Error loading books");
        }
    }

   async function uploadImage() {

    const file =
        bookImageInput.files[0];

    if(!file) {
        return null;
    }

    const formData =
        new FormData();

    formData.append(
        "file",
        file);

    const response =
        await fetch(
            `${API_BASE}/files/upload-book-image`,
            {
                method:"POST",
                headers:{
                    "Authorization":
                        "Bearer " + token
                },
                body:formData
            });

    if(!response.ok){

        throw new Error(
            "Image upload failed");
    }

    return await response.text();
}

   async function saveBook() {

    try {

        const imageName =
            await uploadImage();

        console.log(
            "IMAGE NAME = ",
            imageName);

        const payload = {

            isbn:
                isbnInput.value.trim(),

            title:
                titleInput.value.trim(),

            author:
                authorInput.value.trim(),

            publisher:
                publisherInput.value.trim(),

            imageName:
                imageName,

            categoryId:
                Number(
                    categorySelect.value),

            totalCopies:
                Number(
                    totalCopiesInput.value)
        };

        console.log(payload);

        const response =
            await fetch(
                `${API_BASE}/books`,
                {
                    method:"POST",
                    headers:{
                        "Content-Type":
                            "application/json",
                        "Authorization":
                            "Bearer " + token
                    },
                    body:
                        JSON.stringify(
                            payload)
                });

        if(!response.ok){

            const err =
                await response.text();

            throw new Error(err);
        }

        alert(
            "Book saved successfully");

        loadBooks();

    } catch(error){

        console.error(error);

        alert(error.message);
    }
}

    async function deleteBook(id) {
        if (!confirm("Are you sure you want to delete this book?")) {
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/books/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || "Failed to delete book");
            }

            alert("Book deleted successfully");
            loadBooks(currentPage);
            loadDashboard();
        } catch (error) {
            console.error(error);
            alert("Error deleting book");
        }
    }

    async function searchBooks() {
        try {
            const keyword = searchKeywordInput.value.trim();

            if (!keyword) {
                alert("Please enter a search keyword");
                return;
            }

            searchMode = true;

            const response = await fetch(
                `${API_BASE}/books/search?keyword=${encodeURIComponent(keyword)}`,
                {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || "Search failed");
            }

            const books = await response.json();
            renderBooks(books || []);

            pageInfo.innerText = `Search Results (${books.length})`;
            prevBtn.disabled = true;
            nextBtn.disabled = true;

        } catch (error) {
            console.error(error);
            alert("Error searching books");
        }
    }

    function clearSearch() {
        searchKeywordInput.value = "";
        searchMode = false;
        loadBooks(0);
    }

    function renderBooks(books) {
        const tbody = document.querySelector("#bookTable tbody");
        let html = "";

        books.forEach(book => {
            const imageUrl = book.imageName
                ? `http://localhost:8080/uploads/books/${book.imageName}`
                : "images/no-book.png";

            html += `
            <tr>
                <td>${book.id}</td>
                <td>${book.isbn}</td>
                <td>
                    <img src="${imageUrl}"
                         alt="Book cover"
                         width="60"
                         height="80"
                         style="object-fit:cover;border-radius:8px;">
                </td>
                <td>${book.title}</td>
                <td>${book.author}</td>
                <td>${book.publisher ?? "-"}</td>
                <td>${book.categoryName ?? "-"}</td>
                <td>${book.totalCopies}</td>
                <td>${book.availableCopies}</td>
                <td>
                    <button onclick="deleteBook(${book.id})">Delete</button>
                </td>
            </tr>`;
        });

        tbody.innerHTML = html;
    }

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    sortBySelect.addEventListener("change", () => {
        if (!searchMode) loadBooks(0);
    });

    directionSelect.addEventListener("change", () => {
        if (!searchMode) loadBooks(0);
    });

    async function loadCategories() {
        try {
            const response = await fetch(`${API_BASE}/categories`, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const categories = await response.json();

            let html = '<option value="">Select Category</option>';

            categories.forEach(category => {
                html += `
                <option value="${category.id}">
                    ${category.name}
                </option>`;
            });

            categorySelect.innerHTML = html;

        } catch (error) {
            console.error(error);
        }
    }

    loadCategories();
    loadDashboard();
    loadBooks(0);
</script>

</body>
</html>
